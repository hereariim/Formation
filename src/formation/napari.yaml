name: formation
display_name: Formation
# use 'hidden' to remove plugin from napari hub search results
visibility: public
# see https://napari.org/stable/plugins/technical_references/manifest.html#fields for valid categories
# categories: []
contributions:
  commands:
    - id: formation.make_container_widget
      python_name: formation:ImageThreshold
      title: Make threshold Container widget
    - id: formation.make_magic_widget
      python_name: formation:threshold_magic_widget
      title: Make threshold magic widget
    - id: formation.make_function_widget
      python_name: formation:threshold_autogenerate_widget
      title: Make threshold function widget
    - id: formation.make_qwidget
      python_name: formation:ExampleQWidget
      title: Make example QWidget
  widgets:
    - command: formation.make_container_widget
      display_name: Container Threshold
    - command: formation.make_magic_widget
      display_name: Magic Threshold
    - command: formation.make_function_widget
      autogenerate: true
      display_name: Autogenerate Threshold
    - command: formation.make_qwidget
      display_name: Example QWidget
  menus:
    napari/layers/segment:
      - command: formation.make_container_widget
      - command: formation.make_magic_widget
      - command: formation.make_function_widget
      - command: formation.make_qwidget
